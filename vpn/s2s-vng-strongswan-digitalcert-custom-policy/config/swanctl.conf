# StrongSwan swanctl.conf template for X.509 certificate authentication
#
# This is a reference template. The actual config is generated by
# 03-configure-strongswan.sh with values from the deployment.
#
# Certificate files required:
#   /etc/swanctl/x509/swan-cert.cer         - StrongSwan leaf certificate
#   /etc/swanctl/private/swan-cert.key      - StrongSwan private key
#   /etc/swanctl/x509ca/VPNRootCA-GW.cer    - Azure VPN Gateway Root CA
#   /etc/swanctl/x509ca/VPNRootCA-Swan.cer  - StrongSwan Root CA (own chain)

connections {
   gw0 {
        local_addrs  = <NVA_PRIVATE_IP>
        remote_addrs = <VPNGW_PIP0>
        version = 2
        proposals = aes256gcm16-prfsha256-modp2048
        keyingtries = 0
        encap = yes
        mobike = no
        reauth_time = 28800
        local {
            auth = pubkey
            id = "CN=swan-cert"
            certs = swan-cert.cer
        }
        remote {
            auth = pubkey
            id = "CN=gw1-cert"
            cacerts = VPNRootCA-GW.cer
            revocation = relaxed
        }
        children {
            s2s0 {
                local_ts = 0.0.0.0/0
                remote_ts = 0.0.0.0/0
                esp_proposals = aes256gcm16-modp2048
                dpd_action = restart
                close_action = restart
                start_action = start
                rekey_time = 3600
            }
        }
        if_id_in = 41
        if_id_out = 41
   }
   gw1 {
        local_addrs  = <NVA_PRIVATE_IP>
        remote_addrs = <VPNGW_PIP1>
        version = 2
        proposals = aes256gcm16-prfsha256-modp2048
        keyingtries = 0
        encap = yes
        mobike = no
        reauth_time = 28800
        local {
            auth = pubkey
            id = "CN=swan-cert"
            certs = swan-cert.cer
        }
        remote {
            auth = pubkey
            id = "CN=gw1-cert"
            cacerts = VPNRootCA-GW.cer
            revocation = relaxed
        }
        children {
            s2s1 {
                local_ts = 0.0.0.0/0
                remote_ts = 0.0.0.0/0
                esp_proposals = aes256gcm16-modp2048
                dpd_action = restart
                close_action = restart
                start_action = start
                rekey_time = 3600
            }
        }
        if_id_in = 42
        if_id_out = 42
   }
}
